services:
  api:
    build: .
    container_name: book-library-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - ./:/app

  mongo:
    image: mongo:7
    container_name: book-library-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
