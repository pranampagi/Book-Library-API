services:
  backend:
    build: .
    container_name: book-library-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - ./:/app

  frontend:
    build:
      context: ./frontend
    container_name: book-library-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/client

  mongo:
    image: mongo:7
    container_name: book-library-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
